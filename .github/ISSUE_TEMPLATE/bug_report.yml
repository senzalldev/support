name: Bug Report
description: Report a bug in a Senzall app
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: app
    attributes:
      label: Which app?
      options:
        - "Senzall's Casual Games"
        - "LT Messages"
        - "Savior of Senia"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iPhone
        - iPad
        - Mac
    validations:
      required: true
  - type: input
    id: game
    attributes:
      label: Which game? (Casual Games only)
      description: "e.g., The Forge, The Tavern, The Gallows, The Scribe's Challenge, The Cipher, Adventure Realms"
      placeholder: "Leave blank if not Casual Games"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we trigger this bug?
      placeholder: |
        1. Open the app
        2. Go to...
        3. Tap...
  - type: input
    id: version
    attributes:
      label: App version
      description: "Found in Settings or About (e.g., v1.0.0.80)"
      placeholder: "v1.0.0"
